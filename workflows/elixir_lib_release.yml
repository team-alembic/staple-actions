name: Release an Elixir Library

on:
  release:
    types: [published]
jobs:
  deps:
    name: mix deps.get
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6
      - uses: team-alembic/staple-actions/actions/mix-deps-get@20646fb36ffd4d4e231d4594b1e63b8b0ea60e45 # main

  build-dev:
    name: MIX_ENV=dev mix.compile
    runs-on: ubuntu-latest
    needs: deps
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6
      - uses: team-alembic/staple-actions/actions/mix-compile@20646fb36ffd4d4e231d4594b1e63b8b0ea60e45 # main
        with:
          mix-env: dev

  publish:
    name: MIX_ENV=dev mix hex.publish
    runs-on: ubuntu-latest
    needs: build-dev
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6
      - uses: team-alembic/staple-actions/actions/mix-hex-publish@20646fb36ffd4d4e231d4594b1e63b8b0ea60e45 # main
        with:
          mix-env: dev
          hex-api-key: ${{ secrets.HEX_API_KEY }}
