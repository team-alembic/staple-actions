name: Elixir Library

on:
  push:

jobs:
  deps:
    name: mix deps.get
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6
      - uses: team-alembic/staple-actions/actions/mix-deps-get@20646fb36ffd4d4e231d4594b1e63b8b0ea60e45 # main

  auditor:
    name: mix hex.audit
    runs-on: ubuntu-latest
    needs: deps
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6
      - uses: team-alembic/staple-actions/actions/mix-hex-audit@20646fb36ffd4d4e231d4594b1e63b8b0ea60e45 # main

  build-test:
    name: MIX_ENV=test mix.compile
    runs-on: ubuntu-latest
    needs: deps
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6
      - uses: team-alembic/staple-actions/actions/mix-compile@20646fb36ffd4d4e231d4594b1e63b8b0ea60e45 # main
        with:
          mix-env: test

  formatter:
    name: mix format --check-formatted
    runs-on: ubuntu-latest
    needs: build-test
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6
      - uses: team-alembic/staple-actions/actions/mix-format@20646fb36ffd4d4e231d4594b1e63b8b0ea60e45 # main
        with:
          mix-env: test

  credo:
    name: mix credo --strict
    runs-on: ubuntu-latest
    needs: build-test
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6
      - uses: team-alembic/staple-actions/actions/mix-credo@20646fb36ffd4d4e231d4594b1e63b8b0ea60e45 # main
        with:
          mix-env: test

  doctor:
    name: mix doctor --full --raise
    runs-on: ubuntu-latest
    needs: build-test
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6
      - uses: team-alembic/staple-actions/actions/mix-doctor@20646fb36ffd4d4e231d4594b1e63b8b0ea60e45 # main
        with:
          mix-env: test

  test:
    name: mix test
    runs-on: ubuntu-latest
    needs: build-test
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6
      - uses: team-alembic/staple-actions/actions/mix-test@20646fb36ffd4d4e231d4594b1e63b8b0ea60e45 # main
        with:
          mix-env: test

  dialyzer:
    name: mix dialyzer
    runs-on: ubuntu-latest
    needs: build-test
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6
      - uses: team-alembic/staple-actions/actions/mix-dialyzer@20646fb36ffd4d4e231d4594b1e63b8b0ea60e45 # main
        with:
          mix-env: test

  conventional_commit:
    name: mix git_ops.check_message
    runs-on: ubuntu-latest
    needs: build-test
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6
      - uses: team-alembic/staple-actions/actions/conventional_commit@20646fb36ffd4d4e231d4594b1e63b8b0ea60e45 # main
        with:
          mix-env: test

  sobelow:
    name: mix sobelow --config
    runs-on: ubuntu-latest
    needs: build-test
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6
      - uses: team-alembic/staple-actions/actions/mix-sobelow@20646fb36ffd4d4e231d4594b1e63b8b0ea60e45 # main
        with:
          mix-env: test

  unused_deps:
    name: mix deps.unlock --check-unused
    runs-on: ubuntu-latest
    needs: build-test
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6
      - uses: team-alembic/staple-actions/actions/mix-deps-unlock@20646fb36ffd4d4e231d4594b1e63b8b0ea60e45 # main
        with:
          mix-env: test

  build-dev:
    name: MIX_ENV=dev mix.compile
    runs-on: ubuntu-latest
    needs:
      - credo
      - doctor
      - formatter
      - auditor
      - test
      - dialyzer
      - conventional_commit
      - sobelow
      - unused_deps
    if: ${{ github.event_name == 'push' && github.ref == 'refs/heads/main' }}
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6
      - uses: team-alembic/staple-actions/actions/mix-compile@20646fb36ffd4d4e231d4594b1e63b8b0ea60e45 # main
        with:
          mix-env: dev

  build-docs:
    name: mix docs
    runs-on: ubuntu-latest
    needs: build-dev
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6
      - uses: team-alembic/staple-actions/actions/mix-docs@20646fb36ffd4d4e231d4594b1e63b8b0ea60e45 # main
        with:
          mix-env: dev
      - uses: actions/upload-pages-artifact@fc324d3547104276b827a68afc52ff2a11cc49c9 # v5
        with:
          path: doc/

  deploy-docs:
    name: Deploy docs to GitHub pages.
    runs-on: ubuntu-latest
    needs: build-docs
    permissions:
      pages: write
      id-token: write
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub pages
        id: deployment
        uses: actions/deploy-pages@cd2ce8fcbc39b97be8ca5fce6e763baed58fa128 # v5

  git-ops:
    name: mix git-ops.release
    runs-on: ubuntu-latest
    needs: build-dev
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6
        with:
          fetch-depth: 0
      - uses: team-alembic/staple-actions/actions/git-ops@20646fb36ffd4d4e231d4594b1e63b8b0ea60e45 # main
        with:
          mix-env: dev
